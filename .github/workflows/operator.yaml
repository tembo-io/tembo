name: Operator workflow

permissions:
  pull-requests: write
  deployments: write
  id-token: write
  contents: read

defaults:
  run:
    shell: bash
    working-directory: ./tembo-operator/

on:
  pull_request:
    branches:
      - main
    paths:
      - ".github/workflows/operator.yaml"
      - "tembo-operator/**"
  push:
    branches:
      - main
    paths:
      - ".github/workflows/operator.yaml"
      - "tembo-operator/**"

jobs:
  functional_test:
    name: Run functional testing
    runs-on:
      - operator-runner-8x32
    strategy:
      # fail-fast means to cancel all jobs if one fails
      fail-fast: false
      matrix:
        # Go here for a list of versions:
        # https://github.com/kubernetes-sigs/kind/releases
        kube_version:
          - "v1.31"
    steps:
      - uses: actions/checkout@v4
      - name: Install system dependencies
        run: |
          set -xe
          sudo apt-get update
          sudo apt-get install -y pkg-config libssl-dev git wget build-essential
      - uses: azure/setup-helm@v4
      - uses: extractions/setup-just@v2
      - uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: stable

      # Cache Helm repositories and charts
      - name: Cache Helm repositories and charts
        id: cache-helm
        uses: actions/cache@v3
        with:
          path: |
            ~/.cache/helm
            ~/.helm
          key: helm-cache-${{ runner.os }}-${{ hashFiles('tembo-operator/testdata/*.yaml') }}

      - uses: Swatinem/rust-cache@v2
        with:
          prefix-key: "tembo-operator-functional-test"
          workspaces: |
            tembo-operator

      - name: Check CRD is updated in the charts directory
        run: |
          set -xe
          cargo run --bin crdgen > ../charts/tembo-operator/templates/crd.yaml
          git diff --exit-code ../charts/tembo-operator/templates/crd.yaml

      # Set up K3d cluster using the action
      - uses: nolar/setup-k3d-k3s@v1
        with:
          version: ${{ matrix.kube_version }}
          k3d-name: test
          k3d-args: "--no-lb --no-rollback --registry-create reg --k3s-arg --disable=traefik,servicelb,metrics-server@server:*"

   # Setup cluster components
      - name: Set up cluster components
        run: |
          set -xe

          # Install required components
          just enable-cnpg-default-namespace
          just install-calico
          just install-reflector
          just install-kube-prometheus-stack
          just install-tempo
          just install-traefik
          just install-minio
          just install-operator
          just install-crd
          just annotate

          # Wait for all pods to be ready
          kubectl wait pods --for=condition=Ready --timeout=300s --all --all-namespaces

      - name: Run functional tests
        run: |
          set -xe
          just run > operator-output.txt 2>&1 &
          OPERATOR_PID=$!

          # Wait for operator to be ready
          sleep 15

          # Run the tests with timeout to prevent hanging
          timeout 50m just test
          TEST_EXIT=$?

          # Kill the operator
          kill $OPERATOR_PID || true

          exit $TEST_EXIT

      - name: Debugging information
        if: always()
        run: |
          set +e
          set -x
          echo "========== Operator Output =========="
          cat operator-output.txt
          echo "========== Kubernetes Resources =========="
          kubectl get pods -A
          for ns in $(kubectl get ns -o jsonpath='{.items[*].metadata.name}' | tr ' ' '\n' | grep '^test-coredb-'); do
            echo "==== Namespace: $ns ===="
            kubectl -n $ns get pods -o wide
            kubectl -n $ns describe pods
            kubectl -n $ns get events --sort-by='.lastTimestamp'
            kubectl -n $ns get coredb -o yaml
            kubectl -n $ns get clusters -o yaml
          done